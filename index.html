<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adaptive Learning</title>
    <!-- React & Babel Standalone (Pasti Jalan di GitHub Pages) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS untuk Desain Antarmuka -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Membaca dan mengunci progress level di memori lokal browser (LocalStorage)
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem("english_user_perfect");
                return saved ? JSON.parse(saved) : { level: "Beginner", exp: 0, goal: "General Conversation" };
            });

            const [quiz, setQuiz] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);

            // Database Bank Soal Adaptif Internal (Instan Tanpa Delay Jaringan Server)
            const localDatabase = {
                Beginner: [
                    { 
                        question: "Choose the correct sentence for daily greeting:", 
                        options: ["She go to school yesterday", "He goes to office every day", "They is learning English", "I are a student"], 
                        correctAnswer: "He goes to office every day" 
                    },
                    { 
                        question: "What is the plural form of 'Child'?", 
                        options: ["Childs", "Children", "Childrens", "Childes"], 
                        correctAnswer: "Children" 
                    },
                    { 
                        question: "I ______ a professional computer teacher.", 
                        options: ["am", "is", "are", "be"], 
                        correctAnswer: "am" 
                    }
                ],
                Intermediate: [
                    { 
                        question: "If the server ______ down tomorrow, we will lose our student login data.", 
                        options: ["goes", "go", "went", "going"], 
                        correctAnswer: "goes" 
                    },
                    { 
                        question: "He is looking forward to ______ his web development portfolio next week.", 
                        options: ["deploy", "deployed", "deploying", "deploys"], 
                        correctAnswer: "deploying" 
                    },
                    { 
                        question: "By the time the principal arrived, the teacher ______ the classroom presentation.", 
                        options: ["finish", "have finished", "had finished", "will finish"], 
                        correctAnswer: "had finished" 
                    }
                ],
                Expert: [
                    { 
                        question: "Hardly ______ entered the laboratory when the electricity went out.", 
                        options: ["had he", "he had", "does he", "has he"], 
                        correctAnswer: "had he" 
                    },
                    { 
                        question: "She implemented the new curriculum with such eloquence ______ all instructors were instantly inspired.", 
                        options: ["that", "so", "as", "than"], 
                        correctAnswer: "that" 
                    },
                    { 
                        question: "Were it not for your sophisticated algorithm, I ______ accomplished this automation website.", 
                        options: ["will not have", "would not have", "cannot have", "should not"], 
                        correctAnswer: "would not have" 
                    }
                ]
            };

            // Berjalan otomatis setiap ada perubahan level
            useEffect(() => {
                localStorage.setItem("english_user_perfect", JSON.stringify(user));
                const activeQuestions = localDatabase[user.level] || localDatabase["Beginner"];
                setQuiz(activeQuestions);
                setLoading(false);
            }, [user.level]);

            // Fungsi klik jawaban - Dioptimalkan agar merespons di bawah 1 milidetik
            const handleAnswer = (selectedOption) => {
                let currentQuestions = localDatabase[user.level] || localDatabase["Beginner"];
                let newScore = score;
                
                if (selectedOption === currentQuestions[currentIdx].correctAnswer) {
                    newScore++;
                }
                setScore(newScore);

                if (currentIdx + 1 < currentQuestions.length) {
                    setCurrentIdx(currentIdx + 1);
                } else {
                    // Evaluasi otomatisasi naik tingkat tingkat kelulusan 100% benar
                    let nextLevel = user.level;
                    if (newScore === currentQuestions.length) {
                        if (user.level === "Beginner") nextLevel = "Intermediate";
                        else if (user.level === "Intermediate") nextLevel = "Expert";
                    }

                    setUser(prev => ({
                        ...prev,
                        level: nextLevel,
                        exp: prev.exp + 50
                    }));

                    alert(`Sesi Selesai!\nSkor Anda: ${newScore}/${currentQuestions.length}\nLevel Anda Sekarang: ${nextLevel}`);
                    setCurrentIdx(0);
                    setScore(0);
                }
            };

            if (loading) {
                return (
                    <div class="flex flex-col items-center justify-center min-h-screen p-6">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
                        <p class="text-center text-gray-600 font-medium">Menyiapkan modul kuis...</p>
                    </div>
                );
            }

            return (
                <div class="max-w-md mx-auto mt-16 bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                    {/* Atas: Kartu Status Progress Pengaruh */}
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 text-white flex justify-between items-center shadow-inner">
                        <div>
                            <p class="text-xs text-blue-100 uppercase font-semibold">Target Belajar</p>
                            <h3 class="text-sm font-bold truncate max-w-[180px]">{user.goal}</h3>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs bg-white/20 px-2 py-1 rounded font-mono">EXP: {user.exp}</span>
                            <span class="bg-yellow-400 text-slate-900 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wide shadow-sm">
                                {user.level}
                            </span>
                        </div>
                    </div>
                    
                    {/* Progress Bar Indikator Soal */}
                    <div class="w-full bg-gray-100 h-1.5">
                        <div class="bg-blue-500 h-1.5 transition-all duration-300" style={{ width: `${((currentIdx) / quiz.length) * 100}%` }}></div>
                    </div>

                    {/* Konten Utama Kuis */}
                    <div class="p-6">
                        <span class="text-xs font-bold text-blue-600 uppercase tracking-wider">Pertanyaan {currentIdx + 1} dari {quiz.length}</span>
                        <h2 class="text-lg font-bold text-gray-800 mt-1 mb-6 leading-snug">{quiz[currentIdx].question}</h2>
                        
                        {/* List Pilihan Jawaban */}
                        <div class="space-y-3">
                            {quiz[currentIdx].options.map((opt, i) => (
                                <button 
                                    key={i} 
                                    onClick={() => handleAnswer(opt)} 
                                    class="w-full p-4 text-left border border-gray-200 rounded-xl hover:bg-blue-50 hover:border-blue-300 active:bg-blue-100 font-medium text-gray-700 transition duration-75 shadow-sm flex items-center gap-3 text-sm"
                                >
                                    <span class="w-6 h-6 flex items-center justify-center rounded-full bg-gray-100 text-xs font-bold text-gray-500">{String.fromCharCode(65 + i)}</span>
                                    <span class="flex-1">{opt}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
