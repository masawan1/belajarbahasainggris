<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adaptive Learning</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="module" babel>
        // Import Google Gen AI langsung secara modul browser resmi
        import { GoogleGenAI } from "@google/generative-ai";

        const { useState, useEffect } = React;

        // API Key Gemini milikmu
        const GEMINI_API_KEY = "AIzaSyBQ6A2Ap_Wloye4hg7rv3eIQIb61sMl7zs"; 

        function App() {
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem("english_user");
                return saved ? JSON.parse(saved) : { level: "Beginner", exp: 0, goal: "General Conversation" };
            });

            const [quiz, setQuiz] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [error, setError] = useState("");

            useEffect(() => {
                localStorage.setItem("english_user", JSON.stringify(user));
                loadQuizSDK(user.level, user.goal);
            }, [user.level]);

            // Pemanggilan Resmi menggunakan Google AI SDK Browser (Bebas Hambatan CORS)
            const loadQuizSDK = async (level, goal) => {
                setLoading(true);
                setError("");

                try {
                    const ai = new GoogleGenAI({ apiKey: GEMINI_API_KEY });
                    const model = ai.getGenerativeModel({ 
                        model: "gemini-1.5-flash",
                        generationConfig: { responseMimeType: "application/json" } // Mengunci output wajib JSON
                    });

                    const prompt = `Generate exactly 3 multiple-choice questions for an English learner at '${level}' level with focus on '${goal}'. 
                    Return output STRICTLY in JSON matching this structure: 
                    { "questions": [ { "question": "The text", "options": ["A", "B", "C", "D"], "correctAnswer": "The exact correct option match" } ] }`;

                    const result = await model.generateContent(prompt);
                    const response = await result.response;
                    const text = response.text();
                    
                    const quizData = JSON.parse(text.trim());
                    setQuiz(quizData.questions);
                    setLoading(false);
                } catch (err) {
                    console.error(err);
                    setError("Gagal merancang materi otomatis via Google SDK. Coba periksa koneksi internet Anda.");
                    setLoading(false);
                }
            };

            const handleAnswer = (ans) => {
                let newScore = score;
                if (ans === quiz[currentIdx].correctAnswer) newScore++;
                setScore(newScore);

                if (currentIdx + 1 < quiz.length) {
                    setCurrentIdx(currentIdx + 1);
                } else {
                    setLoading(true);
                    
                    let nextLevel = user.level;
                    if (newScore === quiz.length) {
                        if (user.level === "Beginner") nextLevel = "Intermediate";
                        else if (user.level === "Intermediate") nextLevel = "Expert";
                    }

                    setUser(prev => ({ ...prev, level: nextLevel, exp: prev.exp + 50 }));
                    alert(`Kuis Selesai! Skor Kamu: ${newScore}/${quiz.length}\nLevel Berubah Menjadi: ${nextLevel}`);
                    setCurrentIdx(0);
                    setScore(0);
                }
            };

            if (error) {
                return (
                    <div class="p-10 text-center">
                        <p class="text-red-500 font-bold mb-4">{error}</p>
                        <button onClick={() => loadQuizSDK(user.level, user.goal)} class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Coba Lagi</button>
                    </div>
                );
            }
            
            if (loading) return <div class="p-10 text-center font-medium animate-pulse text-gray-600">🤖 SDK Google resmi sedang memproses pembuatan soal level {user.level}...</div>;

            return (
                <div class="max-w-md mx-auto mt-16 bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 text-white flex justify-between items-center">
                        <div>
                            <p class="text-xs text-blue-100 uppercase font-semibold">Target Belajar</p>
                            <h3 class="text-sm font-bold truncate max-w-[180px]">{user.goal}</h3>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs bg-white/20 px-2 py-1 rounded font-mono">EXP: {user.exp}</span>
                            <span class="bg-yellow-400 text-slate-900 text-xs px-3 py-1 rounded-full font-bold uppercase">{user.level}</span>
                        </div>
                    </div>
                    
                    <div class="p-6">
                        <span class="text-xs font-bold text-blue-600 uppercase">Pertanyaan {currentIdx + 1} dari {quiz.length}</span>
                        <h2 class="text-lg font-bold text-gray-800 mt-1 mb-6">{quiz[currentIdx].question}</h2>
                        
                        <div class="space-y-3">
                            {quiz[currentIdx].options.map((opt, i) => (
                                <button key={i} onClick={() => handleAnswer(opt)} class="w-full p-4 text-left border rounded-xl hover:bg-blue-50 hover:border-blue-300 font-medium text-gray-700 transition shadow-sm flex items-center gap-3">
                                    <span class="w-6 h-6 flex items-center justify-center rounded-full bg-gray-100 text-xs font-bold text-gray-500">{String.fromCharCode(65 + i)}</span>
                                    <span class="text-sm">{opt}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
