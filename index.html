<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adaptive Learning</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Key Gemini milikmu
        const GEMINI_API_KEY = "AIzaSyBQ6A2Ap_Wloye4hg7rv3eIQIb61sMl7zs"; 

        function App() {
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem("english_user");
                return saved ? JSON.parse(saved) : { level: "Beginner", exp: 0, goal: "General Conversation" };
            });

            const [quiz, setQuiz] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [error, setError] = useState("");

            useEffect(() => {
                localStorage.setItem("english_user", JSON.stringify(user));
                loadQuizDirect(user.level, user.goal);
            }, [user.level]);

            // MENEMBAK API GEMINI LANGSUNG MENGGUNAKAN FETCH BAWAAN BROWSER (ANTI-BLOKIR SCRIPT)
            const loadQuizDirect = async (level, goal) => {
                setLoading(true);
                setError("");

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;

                const prompt = `Generate exactly 3 multiple-choice questions for an English learner at '${level}' level with focus on '${goal}'. 
                Return output STRICTLY in JSON format matching this structure: 
                { "questions": [ { "question": "The text", "options": ["A", "B", "C", "D"], "correctAnswer": "The exact correct option match" } ] }
                Do not wrap the response in markdown backticks like \`\`\`json. Return pure JSON string only.`;

                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: prompt }]
                            }]
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.error?.message || `HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();
                    
                    if (!data.candidates || data.candidates.length === 0) {
                        throw new Error("AI tidak mengembalikan respon valid.");
                    }

                    let rawText = data.candidates[0].content.parts[0].text;
                    
                    // Bersihkan teks jika AI bandel menyertakan markdown backticks
                    rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                    
                    const quizData = JSON.parse(rawText);
                    setQuiz(quizData.questions);
                    setLoading(false);
                } catch (err) {
                    console.error(err);
                    setError(`Gagal memuat soal: ${err.message}. Pastikan koneksi internet aman.`);
                    setLoading(false);
                }
            };

            const handleAnswer = (ans) => {
                let newScore = score;
                if (ans === quiz[currentIdx].correctAnswer) newScore++;
                setScore(newScore);

                if (currentIdx + 1 < quiz.length) {
                    setCurrentIdx(currentIdx + 1);
                } else {
                    setLoading(true);
                    
                    let nextLevel = user.level;
                    if (newScore === quiz.length) {
                        if (user.level === "Beginner") nextLevel = "Intermediate";
                        else if (user.level === "Intermediate") nextLevel = "Expert";
                    }

                    setUser(prev => ({ ...prev, level: nextLevel, exp: prev.exp + 50 }));
                    alert(`Kuis Selesai! Skor Kamu: ${newScore}/${quiz.length}\nLevel Berubah Menjadi: ${nextLevel}`);
                    setCurrentIdx(0);
                    setScore(0);
                }
            };

            if (error) {
                return (
                    <div class="max-w-md mx-auto mt-20 bg-red-50 border border-red-200 p-6 rounded-xl shadow-md text-center">
                        <p class="text-red-500 font-bold mb-4 text-sm">{error}</p>
                        <button onClick={() => loadQuizDirect(user.level, user.goal)} class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Coba Lagi</button>
                    </div>
                );
            }
            
            if (loading) {
                return (
                    <div class="flex flex-col items-center justify-center min-h-screen p-6">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
                        <p class="text-center text-gray-600 font-medium">🤖 AI sedang merancang soal level {user.level}...</p>
                    </div>
                );
            }

            return (
                <div class="max-w-md mx-auto mt-16 bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 text-white flex justify-between items-center shadow-inner">
                        <div>
                            <p class="text-xs text-blue-100 uppercase font-semibold">Target Belajar</p>
                            <h3 class="text-sm font-bold truncate max-w-[180px]">{user.goal}</h3>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs bg-white/20 px-2 py-1 rounded font-mono">EXP: {user.exp}</span>
                            <span class="bg-yellow-400 text-slate-900 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wide">{user.level}</span>
                        </div>
                    </div>
                    
                    <div class="p-6">
                        <span class="text-xs font-bold text-blue-600 uppercase tracking-wider">Pertanyaan {currentIdx + 1} dari {quiz.length}</span>
                        <h2 class="text-lg font-bold text-gray-800 mt-1 mb-6 leading-snug">{quiz[currentIdx].question}</h2>
                        
                        <div class="space-y-3">
                            {quiz[currentIdx].options.map((opt, i) => (
                                <button key={i} onClick={() => handleAnswer(opt)} class="w-full p-4 text-left border rounded-xl hover:bg-blue-50 hover:border-blue-300 font-medium text-gray-700 transition shadow-sm flex items-center gap-3 text-sm">
                                    <span class="w-6 h-6 flex items-center justify-center rounded-full bg-gray-100 text-xs font-bold text-gray-500">{String.fromCharCode(65 + i)}</span>
                                    <span class="flex-1">{opt}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
