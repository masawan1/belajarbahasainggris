<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adaptive Learning</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // Membaca status level dari memori browser laptop kamu
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem("english_user_ddg");
                return saved ? JSON.parse(saved) : { level: "Beginner", exp: 0, goal: "General Conversation" };
            });

            const [quiz, setQuiz] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);

            useEffect(() => {
                localStorage.setItem("english_user_ddg", JSON.stringify(user));
                loadQuizManager(user.level, user.goal);
            }, [user.level]);

            const loadQuizManager = async (level, goal) => {
                setLoading(true);
                
                const prompt = `Generate exactly 3 multiple-choice questions for an English learner at '${level}' level with focus on '${goal}'. 
                Return output STRICTLY in valid JSON format matching this structure: 
                { "questions": [ { "question": "The text", "options": ["A", "B", "C", "D"], "correctAnswer": "The exact correct option match" } ] }`;

                try {
                    // Mencoba menembak API DuckDuckGo secara bersih
                    const initRes = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://duckduckgo.com/duckchat/v1/status"));
                    const initData = await initRes.json();
                    const vToken = initRes.headers.get("x-vqd-accept") || "1-223456789-123456789";

                    const response = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://duckduckgo.com/duckchat/v1/chat"), {
                        method: "POST",
                        body: JSON.stringify({
                            model: "meta-llama/Meta-Llama-3-70B-Instruct",
                            messages: [{ role: "user", content: prompt }]
                        })
                    });

                    const proxyData = await response.json();
                    const textData = proxyData.contents;
                    
                    const lines = textData.split("\n");
                    let fullAiText = "";
                    for (let line of lines) {
                        if (line.startsWith("data: ")) {
                            const chunkStr = line.replace("data: ", "").trim();
                            if (chunkStr === "[DONE]") break;
                            const chunkObj = JSON.parse(chunkStr);
                            if (chunkObj.message) fullAiText += chunkObj.message;
                        }
                    }

                    const cleanJson = fullAiText.replace(/```json/g, "").replace(/```/g, "").trim();
                    const quizData = JSON.parse(cleanJson);
                    
                    if (quizData.questions && quizData.questions.length > 0) {
                        setQuiz(quizData.questions);
                        setLoading(false);
                        return;
                    }
                    throw new Error("Format tidak pas");
                } catch (err) {
                    // OTOMATISASI BACKUP: Jika jalur AI macet, langsung muat bank soal adaptif lokal (Anti-Stuck!)
                    console.log("Menggunakan modul soal adaptif lokal...");
                    loadLocalAdaptiveQuiz(level);
                }
            };

            // Bank Soal Cadangan Terintegrasi (Otomatis menyesuaikan level user secara instan)
            const loadLocalAdaptiveQuiz = (level) => {
                const backupData = {
                    Beginner: [
                        { question: "Choose the correct sentence for daily greeting:", options: ["She go to school yesterday", "He goes to office every day", "They is learning English", "I are a student"], correctAnswer: "He goes to office every day" },
                        { question: "What is the plural form of 'Child'?", options: ["Childs", "Children", "Childrens", "Childes"], correctAnswer: "Children" },
                        { question: "I ______ a professional computer network engineer.", options: ["am", "is", "are", "be"], correctAnswer: "am" }
                    ],
                    Intermediate: [
                        { question: "If the server ______ down tomorrow, we will lose our student login data.", options: ["goes", "go", "went", "going"], correctAnswer: "goes" },
                        { question: "He is looking forward to ______ his web development portfolio next week.", options: ["deploy", "deployed", "deploying", "deploys"], correctAnswer: "deploying" },
                        { question: "By the time the principal arrived, the teacher ______ the classroom presentation.", options: ["finish", "have finished", "had finished", "will finish"], correctAnswer: "had finished" }
                    ],
                    Expert: [
                        { question: "Hardly ______ entered the laboratory when the electricity went out.", options: ["had he", "he had", "does he", "has he"], correctAnswer: "had he" },
                        { question: "She implemented the new curriculum with such eloquence ______ all instructors were instantly inspired.", options: ["that", "so", "as", "than"], correctAnswer: "that" },
                        { question: "Were it not for your sophisticated algorithm, I ______ accomplished this automation website.", options: ["will not have", "would not have", "cannot have", "should not"], correctAnswer: "would not have" }
                    ]
                };

                setQuiz(backupData[level] || backupData["Beginner"]);
                setLoading(false);
            };

            const handleAnswer = (ans) => {
                let newScore = score;
                if (ans === quiz[currentIdx].correctAnswer) newScore++;
                setScore(newScore);

                if (currentIdx + 1 < quiz.length) {
                    setCurrentIdx(currentIdx + 1);
                } else {
                    setLoading(true);
                    
                    // Evaluasi Otomatisasi Naik Tingkat
                    let nextLevel = user.level;
                    if (newScore === quiz.length) {
                        if (user.level === "Beginner") nextLevel = "Intermediate";
                        else if (user.level === "Intermediate") nextLevel = "Expert";
                    }

                    setUser(prev => ({ ...prev, level: nextLevel, exp: prev.exp + 50 }));
                    alert(`Sesi Selesai!\nSkor Kamu: ${newScore}/${quiz.length}\nLevel Kamu Sekarang: ${nextLevel}`);
                    setCurrentIdx(0);
                    setScore(0);
                }
            };

            if (loading) {
                return (
                    <div class="flex flex-col items-center justify-center min-h-screen p-6">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-4"></div>
                        <p class="text-center text-gray-600 font-medium animate-pulse">🤖 Menyiapkan materi esensial level {user.level}...</p>
                    </div>
                );
            }

            return (
                <div class="max-w-md mx-auto mt-16 bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                    {/* Header Dasbor */}
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 text-white flex justify-between items-center shadow-inner">
                        <div>
                            <p class="text-xs text-blue-100 uppercase font-semibold">Target Belajar</p>
                            <h3 class="text-sm font-bold truncate max-w-[180px]">{user.goal}</h3>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs bg-white/20 px-2 py-1 rounded font-mono">EXP: {user.exp}</span>
                            <span class="bg-yellow-400 text-slate-900 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wide">{user.level}</span>
                        </div>
                    </div>
                    
                    {/* Kotak Soal */}
                    <div class="p-6">
                        <span class="text-xs font-bold text-blue-600 uppercase tracking-wider">Pertanyaan {currentIdx + 1} dari {quiz.length}</span>
                        <h2 class="text-lg font-bold text-gray-800 mt-1 mb-6 leading-snug">{quiz[currentIdx].question}</h2>
                        
                        {/* Pilihan Jawaban */}
                        <div class="space-y-3">
                            {quiz[currentIdx].options.map((opt, i) => (
                                <button key={i} onClick={() => handleAnswer(opt)} class="w-full p-4 text-left border border-gray-200 rounded-xl hover:bg-blue-50 hover:border-blue-300 font-medium text-gray-700 transition shadow-sm flex items-center gap-3 text-sm">
                                    <span class="w-6 h-6 flex items-center justify-center rounded-full bg-gray-100 text-xs font-bold text-gray-500">{String.fromCharCode(65 + i)}</span>
                                    <span class="flex-1">{opt}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
