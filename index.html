<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adaptive Learning</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Key Gemini milikmu
        const GEMINI_API_KEY = "AIzaSyBNQlALN-luJmkr8geG471TxvCgsuBbzlg"; 

        function App() {
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem("english_user");
                return saved ? JSON.parse(saved) : { level: "Beginner", exp: 0, goal: "General Conversation" };
            });

            const [quiz, setQuiz] = useState([]);
            const [loading, setLoading] = useState(true);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [score, setScore] = useState(0);
            const [error, setError] = useState("");

            useEffect(() => {
                localStorage.setItem("english_user", JSON.stringify(user));
                loadQuiz(user.level, user.goal);
            }, [user.level]);

            const loadQuiz = async (level, goal) => {
                setLoading(true);
                setError("");
                
                // MENGGUNAKAN ENDPOINT TERBARU DAN MODEL FLASH YANG MENDUKUNG CLIENT-SIDE REQUEST
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                
                const prompt = `Generate 3 multiple-choice questions for an English learner at '${level}' level with focus on '${goal}'. ` +
                    `Return STRICTLY JSON format matching structure: { "questions": [ { "question": "The question", "options": ["A", "B", "C", "D"], "correctAnswer": "The exact correct option" } ] }.`;

                try {
                    const res = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { 
                                responseMimeType: "application/json" // Memaksa AI mengembalikan JSON murni
                            }
                        })
                    });
                    
                    if (!res.ok) throw new Error("API Google menolak request");
                    
                    const data = await res.json();
                    const rawText = data.candidates[0].content.parts[0].text;
                    const quizData = JSON.parse(rawText.trim());
                    
                    setQuiz(quizData.questions);
                    setLoading(false);
                } catch (err) {
                    setError("Gagal memuat kuis dari AI. Pastikan kuota API aktif atau coba muat ulang.");
                    setLoading(false);
                }
            };

            const handleAnswer = (ans) => {
                let newScore = score;
                if (ans === quiz[currentIdx].correctAnswer) newScore++;
                setScore(newScore);

                if (currentIdx + 1 < quiz.length) {
                    setCurrentIdx(currentIdx + 1);
                } else {
                    setLoading(true);
                    
                    let nextLevel = user.level;
                    if (newScore === quiz.length) {
                        if (user.level === "Beginner") nextLevel = "Intermediate";
                        else if (user.level === "Intermediate") nextLevel = "Expert";
                    }

                    setUser(prev => ({ ...prev, level: nextLevel, exp: prev.exp + 50 }));
                    alert(`Kuis Selesai! Skor: ${newScore}/${quiz.length}\nLevel kamu sekarang: ${nextLevel}`);
                    setCurrentIdx(0);
                    setScore(0);
                }
            };

            if (error) {
                return (
                    <div class="p-10 text-center">
                        <p class="text-red-500 font-bold mb-4">{error}</p>
                        <button onClick={() => loadQuiz(user.level, user.goal)} class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">Coba Lagi</button>
                    </div>
                );
            }
            
            if (loading) return <div class="p-10 text-center font-medium animate-pulse text-gray-600">🤖 AI sedang merancang soal level {user.level}...</div>;

            return (
                <div class="max-w-md mx-auto mt-16 bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-4 text-white flex justify-between items-center">
                        <div>
                            <p class="text-xs text-blue-100 uppercase font-semibold">Target Belajar</p>
                            <h3 class="text-sm font-bold truncate max-w-[180px]">{user.goal}</h3>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs bg-white/20 px-2 py-1 rounded font-mono">EXP: {user.exp}</span>
                            <span class="bg-yellow-400 text-slate-900 text-xs px-3 py-1 rounded-full font-bold uppercase">{user.level}</span>
                        </div>
                    </div>
                    
                    <div class="p-6">
                        <span class="text-xs font-bold text-blue-600 uppercase">Pertanyaan {currentIdx + 1} dari {quiz.length}</span>
                        <h2 class="text-lg font-bold text-gray-800 mt-1 mb-6">{quiz[currentIdx].question}</h2>
                        
                        <div class="space-y-3">
                            {quiz[currentIdx].options.map((opt, i) => (
                                <button key={i} onClick={() => handleAnswer(opt)} class="w-full p-4 text-left border rounded-xl hover:bg-blue-50 hover:border-blue-300 font-medium text-gray-700 transition shadow-sm flex items-center gap-3">
                                    <span class="w-6 h-6 flex items-center justify-center rounded-full bg-gray-100 text-xs font-bold text-gray-500">{String.fromCharCode(65 + i)}</span>
                                    <span class="text-sm">{opt}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
